<!doctype html> <html lang='zh-Hant'> <head> <meta charset='utf-8'> <meta name='viewport' content='width=device-width,initial-scale=1'> <title>生物互動模擬</title> <style> :root{--bg:#f6f8f4;--panel:#fffffff2;--line:#dbe5db;--text:#1f2a24;--muted:#66736c;--accent:#4f8a70;--shadow:0 16px 42px #29412d14;--r:18px}*{box-sizing:border-box}body{margin:0;padding:14px;background:radial-gradient(circle at 12% 0%,#b4dec252,transparent 34%),radial-gradient(circle at 92% 6%,#b9d8e638,transparent 30%),var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans TC','Microsoft JhengHei',sans-serif}.app{max-width:1880px;margin:auto}.top{display:flex;gap:8px 12px;align-items:center;flex-wrap:wrap;background:var(--panel);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);padding:9px 12px;margin-bottom:10px}.title{font-size:16px;font-weight:800;letter-spacing:.04em;margin-right:auto}.btn{border:1px solid var(--line);border-radius:999px;background:#fff;color:var(--text);font-size:13px;padding:8px 12px;cursor:pointer}.btn:hover{background:#f8fbf8}.btn.primary{background:var(--accent);border-color:var(--accent);color:white}.btn.small{font-size:12px;padding:6px 9px;border-radius:10px}.layout{display:grid;grid-template-columns:minmax(315px,.75fr) minmax(360px,1fr) minmax(360px,1fr);gap:10px;align-items:start}.panel,.card{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);overflow:hidden}.head{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:9px 12px;border-bottom:1px solid var(--line);background:#ffffff99}.head h2{font-size:14px;margin:0}.head span,.muted{font-size:11px;color:var(--muted)}.body{padding:10px}.left{display:flex;flex-direction:column;gap:10px}.tool{display:grid;grid-template-columns:auto 1fr;gap:8px 10px;align-items:center;padding:10px 12px;background:#fbfdfb;border:1px solid var(--line);border-radius:14px}.tool b{font-size:12px;color:var(--muted)}.tool small{display:block;font-weight:600;color:#7a877f}.picker{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:6px}.sp{display:flex;align-items:center;justify-content:center;gap:5px;min-width:0;border:1px solid var(--line);border-radius:10px;background:white;padding:7px 4px;font-size:12px;cursor:pointer}.sp:hover{background:#f1f8f2}.sp.rm:hover{background:#fff4f4;border-color:#e1bcbc;color:#a54c4c}.dot{width:11px;height:11px;border-radius:50%;display:inline-block;flex:0 0 auto}.habitatBox{padding:4px;border:1px solid var(--line);border-radius:14px;background:linear-gradient(180deg,#fafdf9,#eff7f0)}.square{width:100%;aspect-ratio:1/1}canvas{display:block;width:100%;height:100%}#habitat{border:1px solid #cfddcf;border-radius:11px;background:#f8fbf7}.status{padding:10px 12px;border:1px solid var(--line);border-radius:14px;background:#f8fbf8;color:var(--muted);font-size:13px;line-height:1.5}.ok{color:#2f6e56;font-weight:700}.warn{color:#a97828;font-weight:700}.bad{color:#ad4747;font-weight:700}.monitor{grid-column:2/4}.monitorHead{display:grid;grid-template-columns:auto 1fr;gap:10px;align-items:center}.filters{display:flex;flex-wrap:wrap;gap:7px 12px;padding:8px 10px;border:1px solid var(--line);border-radius:12px;background:#f8fbf8}.filters label{display:inline-flex;align-items:center;gap:5px;color:var(--muted);font-size:12px}.filters input{accent-color:var(--accent)}.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.chartCard{padding:9px;border:1px solid var(--line);border-radius:14px;background:#ffffffbd;min-width:0}.ct{display:flex;justify-content:space-between;align-items:baseline;gap:8px;margin:0 0 7px}.ct h3{font-size:13px;margin:0}.ct span{font-size:11px;color:var(--muted)}.chart{height:226px;border:1px solid var(--line);border-radius:12px;background:#fbfdfb}.data{width:100%;border-collapse:collapse;font-size:13px}.data th,.data td{padding:8px 7px;border-bottom:1px solid var(--line);text-align:right;font-variant-numeric:tabular-nums}.data th:first-child,.data td:first-child{text-align:left}.data th{background:#f8fbf8;color:var(--muted);font-weight:700}@media(max-width:1180px){.layout{grid-template-columns:1fr}.monitor{grid-column:1}.grid{grid-template-columns:1fr 1fr}}@media(max-width:760px){body{padding:8px}.grid{grid-template-columns:1fr}.picker{grid-template-columns:repeat(4,1fr)}.monitorHead{grid-template-columns:1fr}.chart{height:220px}} </style> </head> <body> <div class='app'> <header class='top'><button class='btn primary' id='toggle'>暫停</button><div class='title'>生物互動模擬</div><button class='btn' id='reset'>重新開始</button><button class='btn small' id='step'>單步 1 秒</button><button class='btn small' id='shuffle'>重排位置</button><button class='btn small' id='clear'>清空圖表</button><button class='btn small speed' data-v='.5'>0.5x</button><button class='btn small speed' data-v='1'>1x</button><button class='btn small speed' data-v='2'>2x</button><button class='btn small speed' data-v='3'>3x</button><button class='btn small speed primary' data-v='5'>5x</button></header> <main class='layout'> <section class='left'> <div class='tool'><b>投入<small>按一下 10 隻</small></b><div class='picker' id='add'></div><b>移除<small>歸零該生物</small></b><div class='picker' id='remove'></div></div> <section class='panel'><div class='head'><h2>棲地</h2></div><div class='body'><div class='habitatBox'><div class='square'><canvas id='habitat'></canvas></div></div></div></section> <div class='status' id='status'><strong>狀態：</strong>初始化中</div> </section> <section class='panel monitor'><div class='head monitorHead'><h2>數據監測</h2><div class='filters' id='filters'></div></div><div class='body'><div class='grid'><div class='chartCard'><div class='ct'><h3>族群數量趨勢</h3><span>最近 <span id='hist'>120</span> 秒</span></div><canvas class='chart' id='pop'></canvas></div><div class='chartCard'><div class='ct'><h3>標準化數量趨勢</h3><span>前一秒 = 100%，每秒變化</span></div><canvas class='chart' id='norm'></canvas></div><div class='chartCard'><div class='ct'><h3>總生命能量</h3><span>各類加總</span></div><canvas class='chart' id='energy'></canvas></div><div class='chartCard'><div class='ct'><h3>數值</h3><span>目前狀態</span></div><table class='data'><thead><tr><th>生物</th><th>數量</th><th>平均能量</th><th>總能量</th></tr></thead><tbody id='tbody'></tbody></table></div></div></div></section> </main> </div> <script> 'use strict'; const S=[['A','#59a96d',2,120],['B','#3b7bb8',4,30],['C','#7d62b8',6,36],['D','#c95656',6,28],['E','#22252b',2.2,6],['F','#d8b33f',2.5,12],['G','#e28b3c',2.8,14]].map((x,i)=>({id:i,short:x[0],color:x[1],r:x[2],maxE:x[3]})); let org=[],hist=[],visible=Object.fromEntries(S.map(s=>[s.short,true])),selected=Object.fromEntries(S.map(s=>[s.short,false])),running=true,speed=5,last=performance.now(),acc=0,t=0,id=1,world={w:600,h:600}; const H=document.getElementById('habitat'),HC=H.getContext('2d'),PC=document.getElementById('pop').getContext('2d'),NC=document.getElementById('norm').getContext('2d'),EC=document.getElementById('energy').getContext('2d'); function q(n){return document.getElementById(n)}function rand(a,b){return a+Math.random()*(b-a)}function clamp(v,a,b){return Math.max(a,Math.min(b,v))}function prob(r,dt){return 1-Math.exp(-Math.max(0,r)*dt)}function cnt(k){return org.filter(o=>o.live&&o.s.short==k).length}function counts(){let r={total:0};S.forEach(s=>r[s.short]=0);org.forEach(o=>{if(o.live){r[o.s.short]++;r.total++}});return r}function energy(k){let a=org.filter(o=>o.live&&o.s.short==k),sum=a.reduce((m,o)=>m+Math.max(0,o.e),0);return{count:a.length,total:sum,avg:a.length?sum/a.length:0}}function fit(c,ctx){let r=c.getBoundingClientRect(),d=devicePixelRatio||1;c.width=Math.round(r.width*d);c.height=Math.round(r.height*d);ctx.setTransform(d,0,0,d,0,0);return{w:r.width,h:r.height}} function make(s){let a=rand(0,Math.PI*2),r=s.r;return{id:id++,s,x:rand(r,world.w-r),y:rand(r,world.h-r),vx:Math.cos(a),vy:Math.sin(a),e:s.maxE*.65,live:true,cool:0}} function add(k,n=10){let s=S.find(x=>x.short==k);selected[k]=true;for(let i=0;i<n&&org.length<2200;i++)org.push(make(s));record();ui();draw()} function remove(k){org.forEach(o=>{if(o.s.short==k)o.live=false});selected[k]=false;clean();record();ui();draw()} function clean(){org=org.filter(o=>o.live)} function resize(){world=fit(H,HC);[q('pop'),q('norm'),q('energy')].forEach(c=>fit(c,c.getContext('2d')));org.forEach(o=>{o.x=clamp(o.x,o.s.r,world.w-o.s.r);o.y=clamp(o.y,o.s.r,world.h-o.s.r)});draw()}addEventListener('resize',resize); function nearest(o,k,range){let b=null,bd=range*range;for(const x of org){if(!x.live||x.s.short!=k)continue;let dx=x.x-o.x,dy=x.y-o.y,d=dx*dx+dy*dy;if(d<bd){bd=d;b=x}}return b} function steer(o,x,p){if(!x)return;let dx=x.x-o.x,dy=x.y-o.y,d=Math.hypot(dx,dy)||1;o.vx+=dx/d*p;o.vy+=dy/d*p;norm(o)}function norm(o){let l=Math.hypot(o.vx,o.vy)||1;o.vx/=l;o.vy/=l} function move(dt){let sc=speed*dt*60;for(const o of org){o.vx+=rand(-.035,.035);o.vy+=rand(-.035,.035);norm(o);if(o.s.short=='B'||o.s.short=='C')steer(o,nearest(o,'A',70),.025);if(o.s.short=='D')steer(o,nearest(o,'B',120),.026);if(o.s.short=='E')steer(o,nearest(o,'C',120),.04);if(o.s.short=='F')steer(o,nearest(o,'C',110),.035);if(o.s.short=='G')steer(o,nearest(o,'D',150),.055);let sp=[0,.9,.65,1.15,1.25,.95,1.1][o.s.id];o.x+=o.vx*sp*sc;o.y+=o.vy*sp*sc;if(o.x<o.s.r||o.x>world.w-o.s.r){o.x=clamp(o.x,o.s.r,world.w-o.s.r);o.vx*=-1}if(o.y<o.s.r||o.y>world.h-o.s.r){o.y=clamp(o.y,o.s.r,world.h-o.s.r);o.vy*=-1}o.cool=Math.max(0,o.cool-dt)}} function collide(){for(const o of org){if(!o.live||o.cool>0)continue;let prey=null;if(o.s.short=='B'||o.s.short=='C')prey=nearest(o,'A',10);if(o.s.short=='D'&&cnt('B')>8)prey=nearest(o,'B',12);if(o.s.short=='E')prey=nearest(o,'C',9);if(prey){if(o.s.short=='E'){prey.e-=2.5;o.e=clamp(o.e+1,0,o.s.maxE);if(prey.e<=0)prey.live=false}else{prey.live=false;o.e=clamp(o.e+o.s.maxE*.55,0,o.s.maxE)}o.cool=.35}}clean()} function second(){t++;let c=counts();if(c.A<650){for(let i=0;i<Math.max(1,Math.round(c.A*.08));i++)org.push(make(S[0]))}for(const o of org){if(o.s.short!='A')o.e-=o.s.maxE*.018;if(o.e<=0&&o.s.short!='E')o.live=false;let cr=cnt(o.s.short);let born=(o.e>o.s.maxE*.72&&cr<[900,520,260,90,1300,380,80][o.s.id]);if(born&&Math.random()<[0,.08,.035,.018,.15,.045,.025][o.s.id]){let n=o.s.short=='E'?4:(o.s.short=='B'?2:1);for(let i=0;i<n;i++){let baby=make(o.s);baby.x=clamp(o.x+rand(-10,10),o.s.r,world.w-o.s.r);baby.y=clamp(o.y+rand(-10,10),o.s.r,world.h-o.s.r);baby.e=o.s.maxE*.45;org.push(baby)}o.e*=.78}if(o.s.short=='E'&&cnt('C')==0)o.live=false;if(Math.random()<[0,.002,.004,.006,.08,.035,.012][o.s.id])o.live=false}clean();record();ui();charts()} function record(){let c=counts(),r={t};S.forEach(s=>{r[s.short]=c[s.short];r['e'+s.short]=Math.round(energy(s.short).total)});hist.push(r);hist=hist.filter(x=>x.t>=t-120)} function ui(){q('hist').textContent=120;let body=q('tbody');body.innerHTML='';S.forEach(s=>{let e=energy(s.short),tr=document.createElement('tr');tr.innerHTML='<td><span class=dot style=background:'+s.color+'></span> '+s.short+'</td><td>'+e.count+'</td><td>'+Math.round(e.avg)+'</td><td>'+Math.round(e.total)+'</td>';body.appendChild(tr)});let use=S.map(s=>s.short).filter(k=>selected[k]&&k!='E'),c=counts(),van=use.filter(k=>c[k]==0),st=q('status');if(!use.length)st.innerHTML='<strong>狀態：</strong><span class=warn>尚未投入生物</span>｜請先投入至少一種非寄生者生物。';else if(van.length)st.innerHTML='<strong>狀態：</strong><span class=bad>出現族群歸零</span>｜'+van.join('、')+' 已歸零。';else{let recent=hist.filter(x=>x.t>=t-30),big=false;if(recent.length>4)for(const k of use){let a=recent.map(x=>x[k]),mn=Math.min(...a),mx=Math.max(...a),av=a.reduce((p,v)=>p+v,0)/a.length;if(av>0&&(mx-mn)/av>.65)big=true}st.innerHTML='<strong>狀態：</strong><span class='+(big?'warn>明顯波動':'ok>相對穩定')+'</span>｜狀態判斷已排除寄生者 E 的浮動。'}} function draw(){HC.clearRect(0,0,world.w,world.h);HC.fillStyle='#f8fbf7';HC.fillRect(0,0,world.w,world.h);HC.strokeStyle='#56805c14';for(let x=0;x<world.w;x+=28){HC.beginPath();HC.moveTo(x,0);HC.lineTo(x,world.h);HC.stroke()}for(let y=0;y<world.h;y+=28){HC.beginPath();HC.moveTo(0,y);HC.lineTo(world.w,y);HC.stroke()}for(const s of S){HC.fillStyle=s.color;org.forEach(o=>{if(o.live&&o.s==s){HC.beginPath();HC.arc(o.x,o.y,s.r,0,Math.PI*2);HC.fill()}})}} function axes(ctx,w,h,min,max,pct=false){ctx.strokeStyle='#dbe5db';ctx.fillStyle='#66736c';ctx.font='11px sans-serif';let L=46,T=24,R=14,B=30,I=w-L-R,J=h-T-B;for(let i=0;i<=4;i++){let y=T+J*i/4,v=max-(max-min)*i/4;ctx.beginPath();ctx.moveTo(L,y);ctx.lineTo(w-R,y);ctx.stroke();ctx.fillText(Math.round(v)+(pct?'%':''),8,y+4)}ctx.strokeStyle='#cbd8cb';ctx.beginPath();ctx.moveTo(L,T);ctx.lineTo(L,h-B);ctx.lineTo(w-R,h-B);ctx.stroke();return{L,T,R,B,I,J}} function lineChart(ctx,canvas,mode){let z=fit(canvas,ctx),w=z.w,h=z.h;ctx.clearRect(0,0,w,h);ctx.fillStyle='#fbfdfb';ctx.fillRect(0,0,w,h);let minT=Math.max(0,t-120),maxT=Math.max(120,t),min=mode=='norm'?70:0,max=mode=='norm'?130:Math.max(10,...hist.flatMap(r=>S.map(s=>r[s.short]||0)));if(mode=='norm'){let vals=[];for(let i=1;i<hist.length;i++)S.forEach(s=>{let p=hist[i-1][s.short]||0,cur=hist[i][s.short]||0;vals.push(p?clamp(cur/p*100,0,300):100)});max=Math.min(300,Math.max(130,Math.ceil((Math.max(...vals,100)+12)/10)*10));min=Math.max(0,Math.min(70,Math.floor((Math.min(...vals,100)-12)/10)*10))}let a=axes(ctx,w,h,min,max,mode=='norm');S.forEach(s=>{if(!visible[s.short])return;ctx.strokeStyle=s.color;ctx.lineWidth=s.short=='E'?1.6:2.2;ctx.beginPath();let start=false;hist.forEach((r,i)=>{if(r.t<minT)return;let val=r[s.short]||0;if(mode=='norm'){let p=i>0?hist[i-1][s.short]||0:val;val=p?clamp(val/p*100,0,300):100}let x=a.L+(r.t-minT)/(maxT-minT)*a.I,y=a.T+(1-(val-min)/(max-min))*a.J;if(!start){ctx.moveTo(x,y);start=true}else ctx.lineTo(x,y)});ctx.stroke()});if(mode=='norm'){let y=a.T+(1-(100-min)/(max-min))*a.J;ctx.strokeStyle='#50645566';ctx.setLineDash([4,4]);ctx.beginPath();ctx.moveTo(a.L,y);ctx.lineTo(w-a.R,y);ctx.stroke();ctx.setLineDash([])}ctx.font='11px sans-serif';let x=a.L+4,y=14;S.forEach(s=>{if(visible[s.short]){ctx.fillStyle=s.color;ctx.beginPath();ctx.arc(x,y-3,3.5,0,Math.PI*2);ctx.fill();ctx.fillStyle='#66736c';ctx.fillText(s.short,x+7,y);x+=34}})} function barChart(){let c=q('energy'),z=fit(c,EC),w=z.w,h=z.h;EC.clearRect(0,0,w,h);EC.fillStyle='#fbfdfb';EC.fillRect(0,0,w,h);let data=S.map(s=>({s,v:energy(s.short).total})),max=Math.max(10,...data.map(d=>d.v))*1.15,a=axes(EC,w,h,0,max,false),gap=a.I*.026,bw=(a.I-gap*6)/7;EC.textAlign='center';data.forEach((d,i)=>{let x=a.L+i*(bw+gap),bh=d.v/max*a.J,y=a.T+a.J-bh;EC.fillStyle=d.s.color;EC.fillRect(x,y,bw,bh);EC.fillStyle='#1f2a24';EC.fillText(Math.round(d.v),x+bw/2,y-5);EC.fillStyle='#66736c';EC.fillText(d.s.short,x+bw/2,h-12)});EC.textAlign='left'}function charts(){lineChart(PC,q('pop'),'pop');lineChart(NC,q('norm'),'norm');barChart()} function init(){let a=q('add'),r=q('remove'),f=q('filters');S.forEach(s=>{let b=document.createElement('button');b.className='sp';b.innerHTML='<span class=dot style=background:'+s.color+'></span>'+s.short;b.onclick=()=>add(s.short);a.appendChild(b);let rb=b.cloneNode(true);rb.className='sp rm';rb.onclick=()=>remove(s.short);r.appendChild(rb);let lab=document.createElement('label');lab.innerHTML='<input type=checkbox checked><span class=dot style=background:'+s.color+'></span>'+s.short;lab.querySelector('input').onchange=e=>{visible[s.short]=e.target.checked;charts()};f.appendChild(lab)});q('toggle').onclick=()=>{running=!running;q('toggle').textContent=running?'暫停':'繼續';q('toggle').classList.toggle('primary',running)};q('reset').onclick=()=>{org=[];hist=[];selected=Object.fromEntries(S.map(s=>[s.short,false]));t=0;record();ui();draw();charts()};q('step').onclick=()=>{running=false;q('toggle').textContent='繼續';q('toggle').classList.remove('primary');for(let i=0;i<60;i++){move(1/60);collide()}second();draw()};q('shuffle').onclick=()=>{org.forEach(o=>{o.x=rand(o.s.r,world.w-o.s.r);o.y=rand(o.s.r,world.h-o.s.r)});draw()};q('clear').onclick=()=>{hist=[];record();charts()};document.querySelectorAll('.speed').forEach(b=>b.onclick=()=>{speed=Number(b.dataset.v);document.querySelectorAll('.speed').forEach(x=>x.classList.toggle('primary',x==b))});resize();record();ui();charts();requestAnimationFrame(loop)}function loop(now){let dt=Math.min(.05,(now-last)/1000);last=now;if(running){move(dt);collide();acc+=dt*speed;while(acc>=1){acc-=1;second()}}draw();requestAnimationFrame(loop)}init(); </script> </body> </html>
